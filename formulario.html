<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Rifa Kenzo & Roy</title>

    <link rel="stylesheet" href="Css/Style.css" />
    <link rel="stylesheet" href="Css/formulario.css" />
  </head>

  <body>
    <header>
      <div class="header-nav">
        <h1>💥 Me Rifan 💥</h1>
        <a href="index.html" class="btn-volver">← Volver al inicio</a>
      </div>
    </header>

    <div class="container-form">
      <div class="form-card">
        <h2>Compra tus Tickets</h2>

        <form id="formularioRegistro">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required />
          </div>

          <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Tu apellido" required />
          </div>

          <div class="form-group">
            <label for="cedula">Cédula</label>
            <input type="text" id="cedula" placeholder="Tu cédula" required />
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="Tu teléfono" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Tu email" required />
          </div>

          <div class="form-group">
            <label>Selecciona cantidad de números:</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" name="numeros" value="5" />
                <span>5 números</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="numeros" value="10" />
                <span>10 números</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="numeros" value="15" />
                <span>15 números</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" name="numeros" value="20" />
                <span>20 números</span>
              </label>
            </div>
          </div>

          <button type="submit" class="btn-comprar">Comprar</button>
        </form>
      </div>
    </div>

    <footer>
      <p>Valor por número: $2.000</p>
      <p>Contacto: WhatsApp +57 300 391 1810</p>
    </footer>

    <script src="Scripts/formulario.js"></script>
  </body>
</html>
